<\!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花蓮場域用電儀表板</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Microsoft JhengHei','微軟正黑體',Arial,sans-serif; background:#f0f4f8; color:#1e293b; }
  .header { background:linear-gradient(135deg,#1e3a5f 0%,#2d6a9f 100%); color:white; padding:20px 30px; display:flex; align-items:center; gap:16px; }
  .header-icon { font-size:32px; }
  .header-title { font-size:22px; font-weight:700; }
  .header-sub { font-size:13px; opacity:0.8; margin-top:3px; }
  .container { max-width:1280px; margin:0 auto; padding:24px 20px; }
  .kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
  .kpi-card { background:white; border-radius:12px; padding:18px 20px; box-shadow:0 1px 4px rgba(0,0,0,.08); border-left:4px solid var(--accent); }
  .kpi-label { font-size:12px; color:#64748b; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
  .kpi-value { font-size:26px; font-weight:800; color:var(--accent); margin:4px 0 2px; }
  .kpi-unit { font-size:12px; color:#94a3b8; }
  .card { background:white; border-radius:14px; padding:24px; box-shadow:0 1px 6px rgba(0,0,0,.08); margin-bottom:22px; }
  .card-title { font-size:16px; font-weight:700; color:#1e3a5f; margin-bottom:18px; padding-bottom:12px; border-bottom:2px solid #e2e8f0; display:flex; align-items:center; gap:8px; }
  .year-selector { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
  .year-btn { padding:7px 20px; border:2px solid #cbd5e1; border-radius:20px; background:white; cursor:pointer; font-size:14px; font-weight:600; color:#475569; transition:all .2s; }
  .year-btn.active { background:#1e3a5f; border-color:#1e3a5f; color:white; }
  .year-btn:hover:not(.active) { border-color:#2d6a9f; color:#2d6a9f; }
  .three-col { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:0; }
  .chart-wrap { position:relative; width:100%; }
  .legend { display:flex; gap:18px; flex-wrap:wrap; margin-bottom:12px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:13px; color:#475569; }
  .legend-dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
  .tab-bar { display:flex; gap:0; margin-bottom:0; border-bottom:2px solid #e2e8f0; }
  .tab-btn { padding:8px 20px; border:none; background:none; cursor:pointer; font-size:14px; font-weight:600; color:#64748b; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .2s; }
  .tab-btn.active { color:#1e3a5f; border-bottom-color:#1e3a5f; }
  .tab-content { display:none; padding-top:18px; }
  .tab-content.active { display:block; }
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { background:#1e3a5f; color:white; padding:10px 12px; text-align:center; font-weight:600; white-space:nowrap; }
  thead th:first-child { text-align:left; }
  tbody tr:nth-child(even) { background:#f8fafc; }
  tbody tr:hover { background:#e0f2fe; }
  tbody td { padding:9px 12px; border-bottom:1px solid #e2e8f0; text-align:right; white-space:nowrap; }
  tbody td:first-child { text-align:center; font-weight:600; color:#1e3a5f; }
  tfoot td { background:#1e3a5f; color:white; padding:10px 12px; font-weight:700; text-align:right; }
  tfoot td:first-child { text-align:center; }
  .pie-wrap { display:flex; flex-direction:column; align-items:center; }
  .pie-title { font-size:14px; font-weight:700; color:#1e3a5f; margin-bottom:10px; text-align:center; }
  .pie-legend { margin-top:10px; width:100%; }
  .pie-legend-item { display:flex; align-items:center; gap:8px; margin-bottom:5px; font-size:12px; }
  .pie-legend-color { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
  .pie-legend-label { color:#475569; flex:1; }
  .pie-legend-val { font-weight:700; color:#1e3a5f; }
  .pie-legend-pct { color:#94a3b8; font-size:11px; min-width:38px; text-align:right; }
  @media(max-width:768px){ .kpi-row{grid-template-columns:repeat(2,1fr);} .three-col{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">⚡</div>
  <div>
    <div class="header-title">花蓮場域用電儀表板</div>
    <div class="header-sub">靜思堂 ‧ 同心圓餐廳 ‧ 全球寮房　｜　2024 – 2026（修正版）</div>
  </div>
</div>
<div class="container">
  <div class="kpi-row" id="kpiRow"></div>

  <div class="card">
    <div class="card-title"><span>📈</span>月用電量趨勢（度）</div>
    <div class="year-selector" id="yearSelector"></div>
    <div class="legend" id="lineLegend"></div>
    <div class="chart-wrap"><canvas id="lineChart" height="280"></canvas></div>
  </div>

  <div class="card">
    <div class="card-title"><span>🥧</span>各場地年總用電量（圓餅圖）</div>
    <div class="three-col" id="pieRow"></div>
  </div>

  <div class="card">
    <div class="card-title"><span>🏛️</span>靜思堂月用電比較（2024 vs 2025）</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div>2024</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>2025</div>
    </div>
    <div class="chart-wrap"><canvas id="compareChart" height="260"></canvas></div>
  </div>

  <div class="card">
    <div class="card-title"><span>📋</span>月用電明細（度）</div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="showTab('t2024',this)">2024</button>
      <button class="tab-btn" onclick="showTab('t2025',this)">2025</button>
      <button class="tab-btn" onclick="showTab('t2026',this)">2026</button>
    </div>
    <div id="t2024" class="tab-content active"></div>
    <div id="t2025" class="tab-content"></div>
    <div id="t2026" class="tab-content"></div>
  </div>
</div>

<script>
const RAW=[
  {y:2024,m:1,total:280809.49,st:160360.24,rest:94858.72,dorm:25590.53},
  {y:2024,m:2,total:231233.56,st:117593.10,rest:89687.54,dorm:23952.92},
  {y:2024,m:3,total:263814.72,st:129798.26,rest:104873.45,dorm:29143.01},
  {y:2024,m:4,total:337198.23,st:196245.49,rest:113585.38,dorm:27367.36},
  {y:2024,m:5,total:391069.52,st:223554.51,rest:137632.49,dorm:29882.52},
  {y:2024,m:6,total:372565.70,st:209866.32,rest:134259.16,dorm:28440.22},
  {y:2024,m:7,total:451000.00,st:245641.35,rest:173485.33,dorm:31873.32},
  {y:2024,m:8,total:366811.70,st:176222.57,rest:159557.69,dorm:31031.44},
  {y:2024,m:9,total:483595.85,st:256353.86,rest:193825.22,dorm:33416.77},
  {y:2024,m:10,total:404792.53,st:201674.84,rest:146321.53,dorm:56796.16},
  {y:2024,m:11,total:323683.40,st:178806.17,rest:120244.93,dorm:24632.30},
  {y:2024,m:12,total:232129.40,st:120607.32,rest:93857.03,dorm:17665.05},
  {y:2025,m:1,total:173620.33,st:79347.28,rest:69898.38,dorm:24374.67},
  {y:2025,m:2,total:158565.26,st:77761.68,rest:58260.81,dorm:22542.77},
  {y:2025,m:3,total:271582.47,st:153412.75,rest:89004.19,dorm:29165.53},
  {y:2025,m:4,total:279156.55,st:162920.62,rest:91558.39,dorm:24677.54},
  {y:2025,m:5,total:332973.85,st:199485.11,rest:107488.13,dorm:26000.61},
  {y:2025,m:6,total:362085.95,st:211888.42,rest:122494.73,dorm:27702.80},
  {y:2025,m:7,total:400319.25,st:226718.45,rest:142310.20,dorm:31290.60},
  {y:2025,m:8,total:429974.55,st:267283.32,rest:142634.40,dorm:20056.83},
  {y:2025,m:9,total:406418.01,st:222426.94,rest:153062.66,dorm:30928.41},
  {y:2025,m:10,total:420796.11,st:271980.42,rest:145940.11,dorm:2875.58},
  {y:2025,m:11,total:332368.43,st:187143.08,rest:114422.98,dorm:30802.37},
  {y:2025,m:12,total:286501.01,st:163153.72,rest:93819.14,dorm:29528.15},
  {y:2026,m:1,total:215375.90,st:108954.18,rest:78941.46,dorm:27480.26},
  {y:2026,m:2,total:181116.28,st:90760.43,rest:68649.69,dorm:21706.16},
  {y:2026,m:3,total:231870.48,st:106356.66,rest:94151.82,dorm:31362.00},
];
const MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const CLR={st:'#1e3a5f',rest:'#2d9f6a',dorm:'#e07b39',total:'#7c3aed'};
const LBL={st:'靜思堂',rest:'同心圓餐廳',dorm:'全球寮房',total:'總計'};
function byY(y){return RAW.filter(d=>d.y===y);}
function fmt(n){return Math.round(n).toLocaleString('zh-TW');}
function fmtW(n){return (n/10000).toFixed(1)+'萬';}
function sum(arr,k){return arr.reduce((a,d)=>a+d[k],0);}

// KPI
function buildKPI(){
  const t24=sum(byY(2024),'total'),t25=sum(byY(2025),'total'),t26=sum(byY(2026),'total');
  const yoy=((t25-t24)/t24*100).toFixed(1);
  const items=[
    {label:'2024 年用電總量',value:fmtW(t24),unit:'度',accent:'#2563eb'},
    {label:'2025 年用電總量',value:fmtW(t25),unit:'度',accent:'#059669'},
    {label:'2026 年累計（1-3月）',value:fmtW(t26),unit:'度',accent:'#d97706'},
    {label:'2025 vs 2024 年增率',value:(yoy>0?'+':'')+yoy+'%',unit:'年度變化',accent:yoy>0?'#dc2626':'#059669'},
  ];
  document.getElementById('kpiRow').innerHTML=items.map(i=>`
    <div class="kpi-card" style="--accent:${i.accent}">
      <div class="kpi-label">${i.label}</div>
      <div class="kpi-value">${i.value}</div>
      <div class="kpi-unit">${i.unit}</div>
    </div>`).join('');
}

// Line
let lineYear=2024;
function buildYearSel(){
  document.getElementById('yearSelector').innerHTML=[2024,2025,2026].map(y=>
    `<button class="year-btn ${y===lineYear?'active':''}" onclick="selYear(${y})">${y} 年</button>`
  ).join('')+'<span style="margin-left:10px;font-size:12px;color:#94a3b8">（點選年份切換）</span>';
}
function selYear(y){lineYear=y;buildYearSel();drawLine();}

function drawLine(){
  const data=byY(lineYear);
  const canvas=document.getElementById('lineChart');
  const W=canvas.parentElement.clientWidth;
  const H=280; canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const pad={t:20,r:30,b:50,l:72};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const keys=['total','st','rest','dorm'];
  const maxV=Math.max(...data.map(d=>d.total))*1.12;
  const ticks=5;
  ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=1;
  ctx.fillStyle='#94a3b8'; ctx.font='11px Arial'; ctx.textAlign='right';
  for(let i=0;i<=ticks;i++){
    const v=maxV*i/ticks, yy=pad.t+ch-(v/maxV)*ch;
    ctx.beginPath(); ctx.moveTo(pad.l,yy); ctx.lineTo(pad.l+cw,yy); ctx.stroke();
    ctx.fillText(fmtW(v),pad.l-6,yy+4);
  }
  const xStep=cw/(data.length-1||1);
  ctx.fillStyle='#475569'; ctx.textAlign='center'; ctx.font='12px Arial';
  data.forEach((d,i)=>ctx.fillText(MN[d.m-1],pad.l+i*xStep,H-pad.b+18));
  keys.forEach(k=>{
    ctx.strokeStyle=CLR[k]; ctx.lineWidth=k==='total'?3:2;
    ctx.setLineDash(k==='total'?[6,3]:[]);
    ctx.beginPath();
    data.forEach((d,i)=>{
      const x=pad.l+i*xStep, y=pad.t+ch-(d[k]/maxV)*ch;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke(); ctx.setLineDash([]);
    data.forEach((d,i)=>{
      const x=pad.l+i*xStep, y=pad.t+ch-(d[k]/maxV)*ch;
      ctx.beginPath(); ctx.arc(x,y,k==='total'?4:3,0,Math.PI*2);
      ctx.fillStyle=CLR[k]; ctx.fill();
    });
  });
  document.getElementById('lineLegend').innerHTML=keys.map(k=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${CLR[k]}"></div>${LBL[k]}${k==='total'?' (虛線)':''}
    </div>`).join('');
}

// Pie
function drawPie(canvasId,agg,yearLabel){
  const vals=[agg.st,agg.rest,agg.dorm];
  const total=vals.reduce((a,b)=>a+b,0);
  const clrs=[CLR.st,CLR.rest,CLR.dorm];
  const names=['靜思堂','同心圓餐廳','全球寮房'];
  const canvas=document.getElementById(canvasId);
  const SIZE=Math.min(canvas.parentElement.clientWidth,180);
  canvas.width=SIZE; canvas.height=SIZE;
  const ctx=canvas.getContext('2d');
  const cx=SIZE/2,cy=SIZE/2,r=SIZE/2-6;
  let start=-Math.PI/2;
  vals.forEach((v,i)=>{
    const a=(v/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,start+a); ctx.closePath();
    ctx.fillStyle=clrs[i]; ctx.fill();
    ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
    start+=a;
  });
  ctx.beginPath(); ctx.arc(cx,cy,r*.44,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
  ctx.fillStyle='#1e3a5f'; ctx.font='bold 12px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(yearLabel,cx,cy-7);
  ctx.font='10px Arial'; ctx.fillStyle='#64748b';
  ctx.fillText(fmtW(total)+'度',cx,cy+9);
  return vals.map((v,i)=>({name:names[i],val:v,pct:(v/total*100).toFixed(1),color:clrs[i]}));
}

function buildPies(){
  const row=document.getElementById('pieRow');
  row.innerHTML=[2024,2025,2026].map(y=>`
    <div class="card" style="padding:18px;margin-bottom:0">
      <div class="pie-title">${y}年${y===2026?'<span style="font-size:11px;color:#94a3b8">（1-3月）</span>':''}</div>
      <div class="pie-wrap"><canvas id="pie${y}"></canvas></div>
      <div class="pie-legend" id="pieLeg${y}"></div>
    </div>`).join('');
  setTimeout(()=>{
    [2024,2025,2026].forEach(y=>{
      const data=byY(y);
      const agg={st:sum(data,'st'),rest:sum(data,'rest'),dorm:sum(data,'dorm')};
      const ld=drawPie('pie'+y,agg,y+'年');
      document.getElementById('pieLeg'+y).innerHTML=ld.map(l=>`
        <div class="pie-legend-item">
          <div class="pie-legend-color" style="background:${l.color}"></div>
          <span class="pie-legend-label">${l.name}</span>
          <span class="pie-legend-val">${fmtW(l.val)}</span>
          <span class="pie-legend-pct">${l.pct}%</span>
        </div>`).join('');
    });
  },60);
}

// Compare
function drawCompare(){
  const d24=byY(2024),d25=byY(2025);
  const canvas=document.getElementById('compareChart');
  const W=canvas.parentElement.clientWidth, H=260;
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const pad={t:20,r:30,b:50,l:72};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const allSt=[...d24.map(d=>d.st),...d25.map(d=>d.st)];
  const maxV=Math.max(...allSt)*1.15;
  const ticks=5;
  ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=1;
  ctx.fillStyle='#94a3b8'; ctx.font='11px Arial'; ctx.textAlign='right';
  for(let i=0;i<=ticks;i++){
    const v=maxV*i/ticks, y=pad.t+ch-(v/maxV)*ch;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke();
    ctx.fillText(fmtW(v),pad.l-6,y+4);
  }
  const n=12, gW=cw/n, bW=gW*0.33;
  [[d24,'#2563eb',0],[d25,'#f59e0b',1]].forEach(([data,color,off])=>{
    data.forEach((d,i)=>{
      const x=pad.l+i*gW+(off===0?gW*.08:gW*.58);
      const bH=(d.st/maxV)*ch, y=pad.t+ch-bH;
      ctx.fillStyle=color;
      ctx.beginPath(); ctx.rect(x,y,bW,bH); ctx.fill();
    });
  });
  ctx.fillStyle='#475569'; ctx.textAlign='center'; ctx.font='12px Arial';
  for(let i=0;i<n;i++) ctx.fillText(MN[i],pad.l+i*gW+gW/2,H-pad.b+18);
}

// Tables
function buildTables(){
  [2024,2025,2026].forEach(y=>{
    const data=byY(y);
    const rows=data.map(d=>`<tr>
      <td>${d.m}月</td>
      <td>${fmt(d.st)}</td>
      <td>${fmt(d.rest)}</td>
      <td>${fmt(d.dorm)}</td>
      <td style="font-weight:700;color:#1e3a5f">${fmt(d.total)}</td>
    </tr>`).join('');
    const note=y===2026?'（1-3月）':'';
    document.getElementById('t'+y).innerHTML=`
      <div class="table-wrap"><table>
        <thead><tr><th>月份</th><th>靜思堂（度）</th><th>同心圓餐廳（度）</th><th>全球寮房（度）</th><th>月總計（度）</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr>
          <td>${y}年合計${note}</td>
          <td>${fmt(sum(data,'st'))}</td>
          <td>${fmt(sum(data,'rest'))}</td>
          <td>${fmt(sum(data,'dorm'))}</td>
          <td>${fmt(sum(data,'total'))}</td>
        </tr></tfoot>
      </table></div>`;
  });
}

function showTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

window.addEventListener('load',()=>{
  buildKPI(); buildYearSel(); buildPies(); buildTables();
  setTimeout(()=>{drawLine();drawCompare();},80);
});
window.addEventListener('resize',()=>{drawLine();drawCompare();});
</script>
</body>
</html>
